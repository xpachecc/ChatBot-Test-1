# ──────────────────────────────────────────────────────────────────────
# CFS (Customer-Facing Sales) Conversation Flow — GraphDSL v1
# ──────────────────────────────────────────────────────────────────────
# This file fully describes the graph topology for the CFS chatbot.
# Runtime infrastructure (state validation, runTurn lifecycle, AI/vector
# tooling) is shared and NOT redefined here.
# ──────────────────────────────────────────────────────────────────────

graph:
  graphId: cfs
  version: "1.0.0"
  description: >
    4-step consultative conversation: Know Your Customer, Narrow Down
    Use Cases, Perform Discovery, and Final Readout with Next Steps.
  entrypoint: routeInitFlow
  tags:
    - cfs
    - discovery
    - readout

stateContractRef: "state.CfsStateSchema"

# ── Node catalog ─────────────────────────────────────────────────────
nodes:
  # Routing control (passthrough identity nodes)
  - id: routeInitFlow
    kind: router
    handlerRef: "cfs.routeInitFlow"
    intent: "Route the conversation to the next appropriate step based on session state"

  - id: routePillarsLoop
    kind: router
    handlerRef: "cfs.routePillarsLoop"
    intent: "Control the pillar analysis loop and gate readout generation"

  - id: routeAfterIngestUseCaseSelection
    kind: router
    handlerRef: "cfs.routeAfterIngestUseCaseSelection"
    intent: "Route after use case selection — proceed to questions if valid, retry otherwise"

  # Step 1: Know Your Customer
  - id: sendIntroAndAskUseCaseGroup
    kind: question
    writes: [messages, session_context, use_case_context]
    description: "Send introduction and ask for use case group."
    nodeConfig:
      greeting:
        stringKeys: ["step1.greet", "step1.followup"]
        afterQuestionKey: "S1_USE_CASE_GROUP"
        initialSessionContext:
          started: true
          awaiting_user: true
          step_question_index: 0
          step_clarifier_used: false

  - id: askUserName
    kind: question
    description: "Ask user for their name."
    nodeConfig:
      question:
        stringKey: "step1.nameQuestion"
        questionKey: "S1_NAME"
        questionPurpose: "collect_name"
        targetVariable: "name"
        autoIngest:
          saveTo: "user_context.first_name"
          sanitizeAs: "name"
          then: routeInitFlow

  - id: askIndustry
    kind: question
    writes: [messages, session_context]
    description: "Ask user for their industry."
    nodeConfig:
      question:
        stringKeys: ["step1.industryIntro", "step1.industryBody", "step1.industryPrompt"]
        questionKey: "S1_INDUSTRY"
        questionPurpose: "collect_industry"
        targetVariable: "industry"
        interpolateFrom:
          name: "user_context.first_name"

  - id: askRole
    kind: question
    writes: [messages, session_context]
    description: "Ask user for their role."
    nodeConfig:
      question:
        stringKey: "step1.roleQuestion"
        questionKey: "S1_ROLE"
        questionPurpose: "collect_role"
        targetVariable: "role"
        allowAIRephrase: true
        prefix:
          stateField: "user_context.first_name"
          fallback: "there"
        rephraseContext:
          industryField: "user_context.industry"
          roleField: "user_context.persona_role"
          useCaseGroupsField: "use_case_context.use_case_groups"
          actorRole: "SAAS Enterprise Account Executive"
          tone: "conversational, curious"

  - id: askTimeframe
    kind: question
    description: "Ask user for their timeframe."
    nodeConfig:
      question:
        stringKey: "step1.timeframeQuestion"
        questionKey: "S1_TIMEFRAME"
        questionPurpose: "collect_timeframe"
        targetVariable: "timeframe"
        allowAIRephrase: true
        prefix:
          stateField: "user_context.persona_clarified_role|user_context.persona_role"
          fallback: "your role"
        rephraseContext:
          industryField: "user_context.industry"
          roleField: "user_context.persona_clarified_role|user_context.persona_role"
          useCaseGroupsField: "use_case_context.use_case_groups"
          actorRole: "SAAS Enterprise Account Executive"
          tone: "conversational, curious"
        autoIngest:
          saveTo: "user_context.timeframe"
          sanitizeAs: "timeframe"
          then: knowYourCustomerEcho

  - id: internetSearch
    kind: integration
    handlerRef: "step1.nodeInternetSearch"
    intent: "Search the internet for industry context to improve conversation relevance"
    writes: [internet_search_context, session_context]

  - id: ingestUseCaseGroupSelection
    kind: ingest
    handlerRef: "step1.nodeStep1Ingest"
    intent: "Process the user's use case group selection and resolve persona"
    reads: [messages, session_context]
    writes: [use_case_context, session_context]

  - id: ingestConfirmStart
    kind: ingest
    reads: [messages, session_context]
    writes: [messages, session_context]
    signalAgents: false
    nodeConfig:
      ingest:
        affirmativeCheckConfig:
          rejectStringKey: "step1.confirmStartDecline"
          rejectPatch:
            awaiting_user: false
            last_question_key: null
          acceptQuestionConfig:
            stringKey: "step1.nameQuestion"
            questionKey: "S1_NAME"
            questionPurpose: "collect_name"
            targetVariable: "name"

  - id: ingestIndustry
    kind: ingest
    handlerRef: "step1.nodeStep1Ingest"
    intent: "Process the user's industry input, clarify if vague, and resolve market segment"
    reads: [messages, session_context]
    writes: [user_context, session_context]

  - id: ingestRole
    kind: ingest
    handlerRef: "step1.nodeStep1Ingest"
    intent: "Process the user's role input and resolve persona group"
    reads: [messages, session_context]
    writes: [user_context, session_context]

  - id: ingestConfirmRole
    kind: ingest
    handlerRef: "step1.nodeStep1Ingest"
    intent: "Process the user's role confirmation response"
    reads: [messages, session_context]
    writes: [user_context, session_context]

  - id: ingestKycConfirm
    kind: ingest
    reads: [messages, session_context]
    writes: [messages, session_context]
    signalAgents: false
    nodeConfig:
      ingest:
        affirmativeCheckConfig:
          rejectStringKey: "step1.kycConfirmReject"
          rejectPatch:
            last_question_key: "S1_KYC_CONFIRM"
          acceptStringKey: "step1.kycContinuation"
          acceptPatch:
            awaiting_user: false
            last_question_key: null

  - id: knowYourCustomerEcho
    kind: compute
    handlerRef: "step1.nodeKnowYourCustomerEcho"
    intent: "Echo back the collected customer information for confirmation before proceeding"
    reads: [user_context, use_case_context, vector_context]
    writes: [messages, session_context]
    signalAgents: true

  # Step 2: Narrow Down Use Cases
  - id: nodeDetermineUseCases
    kind: compute
    handlerRef: "step2.nodeDetermineUseCases"
    intent: "Use AI to determine and present relevant use cases based on the user's profile"
    reads: [user_context, use_case_context, vector_context]
    writes: [use_case_context, messages, session_context]

  - id: ingestUseCaseSelection
    kind: ingest
    handlerRef: "step2.nodeIngestUseCaseSelection"
    intent: "Process the user's use case selection and validate choices"
    reads: [messages, session_context]
    writes: [use_case_context, session_context]

  - id: nodeDetermineUseCaseQuestions
    kind: compute
    handlerRef: "step2.nodeDetermineUseCaseQuestions"
    intent: "Use AI to generate discovery questions tailored to the selected use cases"
    reads: [user_context, use_case_context, vector_context]
    writes: [use_case_context, session_context]

  # Step 3: Perform Discovery
  - id: nodeAskUseCaseQuestions
    kind: question
    handlerRef: "step3.nodeAskUseCaseQuestions"
    intent: "Present discovery questions to the user one at a time and collect answers"
    reads: [use_case_context, session_context]
    writes: [messages, session_context, use_case_context]

  - id: nodeDeterminePillars
    kind: compute
    handlerRef: "step3.nodeDeterminePillars"
    intent: "Use AI to identify and prioritize solution pillars based on discovery answers"
    reads: [use_case_context, user_context]
    writes: [use_case_context, session_context]

  # Step 4: Build Readout
  - id: nodeBuildReadout
    kind: compute
    handlerRef: "step4.nodeBuildReadout"
    intent: "Generate the final readout document with personalized recommendations"
    reads: [user_context, use_case_context, vector_context, readout_context]
    writes: [readout_context, session_context]

  # Step 5: Readout Summary and Next Steps
  - id: nodeDisplayReadout
    kind: compute
    reads: [readout_context, session_context]
    writes: [messages]
    description: "Display readout document and download option."
    nodeConfig:
      display:
        statePath: "readout_context.rendered_outputs.markdown"
        fallbackMessage: "Your strategic readout is ready."
        appendDownloadUrl:
          stateField: "readout_context.delivery.download.url"
          fallbackPattern: "/readout/{{session_id}}.md"

# ── Transitions ──────────────────────────────────────────────────────
transitions:
  conditional:
    - from: routeInitFlow
      routerRef: "cfs.routeInitFlow"

    - from: routePillarsLoop
      routerRef: "cfs.routePillarsLoop"

    - from: routeAfterIngestUseCaseSelection
      routerRef: "cfs.routeAfterIngestUseCaseSelection"

  static:
    - { from: ingestKycConfirm,            to: nodeDetermineUseCases }
    - { from: ingestUseCaseSelection,      to: routeAfterIngestUseCaseSelection }
    - { from: nodeDetermineUseCaseQuestions, to: nodeAskUseCaseQuestions }
    - { from: nodeDeterminePillars,        to: routePillarsLoop }
    - { from: nodeBuildReadout,            to: nodeDisplayReadout }

# ── Runtime config references ────────────────────────────────────────
runtimeConfigRefs:
  messagePolicyRef: "cfs.messagePolicy"
  promptSetRef: "cfs.aiPrompts"

# ── Per-graph conversation config ────────────────────────────────────
config:
  meta:
    flowTitle: "Discovery Account Executive"
    flowDescription: "This automated assessment analyzes your needs to provide personalized strategic insights."
    steps:
      - key: STEP1_KNOW_YOUR_CUSTOMER
        label: "Know Your Customer"
        order: 1
        countable: true
        totalQuestions: 6
        countingStrategy: questionKeyMap
      - key: STEP2_NARROW_DOWN_USE_CASES
        label: "Narrow Down Use Cases"
        order: 2
        countable: true
        totalQuestions: 1
        countingStrategy: useCaseSelect
      - key: STEP3_PERFORM_DISCOVERY
        label: "Perform Discovery"
        order: 3
        countable: true
        totalQuestions: 3
        countingStrategy: dynamicCount
      - key: STEP4_BUILD_READOUT
        label: "Build Readout"
        order: 4
        countable: true
        totalQuestions: 1
        countingStrategy: readoutReady
      - key: STEP5_READOUT_SUMMARY_NEXT_STEPS
        label: "Readout Summary and Next Steps"
        order: 5
        countable: true
        totalQuestions: 1
        countingStrategy: readoutReady

  overlayPrefixes:
    Mentor_Supportive: "To keep this supportive, "
    CTO_Consultative: "To keep this focused, "
    SeniorSE_Challenging: "To stress-test this, "
    Coach_Affirmative: "To build on your momentum, "
    default: "To stay aligned, "

  exampleTemplates: { $file: "./flow-content.yaml#exampleTemplates" }

  progressRules:
    questionKeyMap:
      S1_USE_CASE_GROUP: 0
      CONFIRM_START: 1
      S1_NAME: 1
      S1_INDUSTRY: 2
      S1_INTERNET_SEARCH: 2
      S1_ROLE: 3
      CONFIRM_ROLE: 4
      S1_TIMEFRAME: 4
      S1_KYC_CONFIRM: 5
    dynamicCountField: "use_case_context.discovery_questions"
    dynamicCountStepKey: "STEP3_PERFORM_DISCOVERY"

  options:
    CONFIRM_START: ["Yes", "No"]
    CONFIRM_ROLE: ["Yes, that's correct", "No, let me clarify"]
    S1_KYC_CONFIRM: ["Yes, let's continue", "No"]
    S1_TIMEFRAME: ["6 months", "12 months"]

  dynamicOptions:
    S1_USE_CASE_GROUP:
      source: service
      serviceRef: persona-groups.getUseCaseGroups
    S3_USE_CASE_SELECT:
      source: state
      statePath: use_case_context.use_cases_prioritized
      format: numbered_list

  ingestFieldMappings:
    S1_ROLE: { targetField: user_context.persona_role, sanitizeAs: role }
    S1_INDUSTRY: { targetField: user_context.industry, sanitizeAs: industry }
    S1_GOAL: { targetField: user_context.goal_statement, sanitizeAs: goal, captureObjective: true }

  continuationTriggers:
    - traceIncludes: "ask_use_case_questions:complete"
      notReadoutReady: true
      steps: ["STEP3_PERFORM_DISCOVERY", "STEP4_BUILD_READOUT"]
      items: ["Continue to readout"]

  routingRules:
    routeInitFlow:
      - when: { primitive_counter: 0, messages_empty: true }
        goto: sendIntroAndAskUseCaseGroup
      - when: { started: false }
        goto: sendIntroAndAskUseCaseGroup
      - when:
          awaiting_user: false
          state_path_empty: "user_context.first_name"
          state_path_not_empty: "use_case_context.use_case_groups"
          last_answer_equals: "yes"
        goto: askUserName
      # Sequencing rules: after each ingest, route to the next question
      - when:
          awaiting_user: false
          state_path_not_empty: "user_context.first_name"
          state_path_empty: "user_context.industry"
        goto: askIndustry
      - when:
          awaiting_user: false
          state_path_not_empty: "user_context.industry"
          state_path_empty: "user_context.persona_role"
        goto: askRole
      - when:
          awaiting_user: false
          state_path_not_empty: "user_context.persona_role"
          state_path_empty: "user_context.timeframe"
          trace_includes: "confirm_role:accepted"
        goto: askTimeframe
      - when:
          awaiting_user: false
          trace_includes: "ask_use_case_questions:complete"
        goto: nodeDeterminePillars
      - when:
          awaiting_user: false
          state_path_length_gt: { path: "use_case_context.discovery_questions", value: 0 }
          trace_not_includes: "ask_use_case_questions:start"
        goto: nodeAskUseCaseQuestions
      - when:
          awaiting_user: false
          step_equals: "STEP4_BUILD_READOUT"
          state_path_not_equals: { path: "readout_context.status", value: "ready" }
        goto: nodeBuildReadout
      - awaitingDispatch:
          S1_USE_CASE_GROUP: ingestUseCaseGroupSelection
          CONFIRM_START: ingestConfirmStart
          S1_INDUSTRY: ingestIndustry
          S1_ROLE: ingestRole
          CONFIRM_ROLE: ingestConfirmRole
          S1_KYC_CONFIRM: ingestKycConfirm
          S1_INTERNET_SEARCH: internetSearch
          S3_USE_CASE_SELECT: ingestUseCaseSelection
          S3_DISCOVERY_QUESTION: nodeAskUseCaseQuestions
      - default: end
    routePillarsLoop:
      - when: { state_path_equals: { path: "readout_context.status", value: "ready" } }
        goto: end
      - when: { awaiting_user: true }
        goto: end
      - default: nodeBuildReadout
    routeAfterIngestUseCaseSelection:
      - when: { state_path_not_empty: "use_case_context.selected_use_cases" }
        goto: nodeDetermineUseCaseQuestions
      - default: end

  models:
    knowYourCustomer:
      model: "gpt-3.5-turbo"
      temperature: 0.4
      maxRetries: 1
    useCaseQuestions:
      model: "gpt-3.5-turbo"
      temperature: 0.4
      maxRetries: 1
    readout:
      model: "gpt-4o"
      temperature: 0.4
      maxRetries: 1

  messagePolicy:
    intro: { allowAIRephrase: false, forbidFirstPerson: false }
    name: { allowAIRephrase: false, forbidFirstPerson: false }
    industry: { allowAIRephrase: false, forbidFirstPerson: false }
    role: { allowAIRephrase: false, forbidFirstPerson: false }
    industryClarifier: { allowAIRephrase: false, forbidFirstPerson: true }
    roleClarifier: { allowAIRephrase: true, forbidFirstPerson: true }
    default: { allowAIRephrase: false, forbidFirstPerson: false }

  aiPrompts: { $file: "./flow-content.yaml#aiPrompts" }

  strings: { $file: "./flow-content.yaml#strings" }

  readout:
    sectionKeys:
      - framing_header
      - section_1_exec_summary
      - section_2_solution_areas
      - section_3_recommendations
      - section_4_feature_mapping
      - section_5_immediate_actions
      - section_6_other_benefits
      - section_7_final_thoughts
    sectionContract: |
      <<No Section number>> : Strategic Framing Header
      Section 1: Exec Summary
      Section 2: Solution Areas
      Section 3: Recommendations for Progression
      Section 4: PURE Feature Mapping Table
      Section 5: Immediate Actions (Tactics)
      Section 6: Other Benefits Available to You from PURE STORAGE
      Section 7: Final Thoughts
      Use ReadinessLevel naming and preserve order with no omissions.

  questionTemplates: { $file: "./flow-content.yaml#questionTemplates" }

  clarifierRetryText: { $file: "./flow-content.yaml#clarifierRetryText" }

  clarificationAcknowledgement: { $file: "./flow-content.yaml#clarificationAcknowledgement" }

  readoutVoice:
    rolePerspective: "Coach_Affirmative"
    voiceCharacteristics: "Energetic and optimistic; celebrates progress."
    behavioralIntent: "Close sessions on a motivational note."

  delivery:
    outputTargets: ["download"]
    defaultOutputTargets: ["download"]
    allowMultiTarget: true
    overridesByTenant: {}

  signalAgents:
    enabled: true
    ttlMs: 1000

# ── Compile-time validation ──────────────────────────────────────────
validation:
  requiredStateFields:
    - session_context.session_id
