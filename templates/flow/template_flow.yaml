# ──────────────────────────────────────────────────────────────────────
# Flow YAML Template — GraphDSL v1
# ──────────────────────────────────────────────────────────────────────
# Reverse-engineered from clients/default/flows/cfs-default/flow.yaml.
# Copy to clients/<tenantId>/flows/<flowId>/flow.yaml and customize.
#
# NOTE: This template will not compile until handlers are registered and
# all handlerRef/routerRef values resolve in the handler registry.
#
# Reference: docs/graph-authoring.md
# Schema: src/langgraph/schema/graph-dsl-types.ts
# ──────────────────────────────────────────────────────────────────────

# ── Graph metadata (required) ────────────────────────────────────────
graph:
  graphId: "myFlow"                     # Unique identifier; use camelCase to match handlerRef prefix
  version: "1.0.0"                      # Semantic version
  description: >                        # Human-readable flow description
    Brief description of what this conversation flow accomplishes.
  entrypoint: routeInitFlow             # Node ID where execution begins
  tags:                                 # Optional tags for filtering
    - myFlow
    - example

# ── State contract (required) ─────────────────────────────────────────
stateContractRef: "state.CfsStateSchema"

# ── Node catalog (required, min 1) ─────────────────────────────────────
# Node kinds: router | question | ingest | compute | integration | terminal
# Optional on nodes: reads, writes, description, signalAgents
nodes:
  # Router (required for conditional branching)
  - id: routeInitFlow
    kind: router
    handlerRef: "myFlow.routeInitFlow"  # Format: <graphId>.<handlerName>
    description: "Central router — dispatches based on session state."

  # Greeting node — generic (sends config strings, sets initial session context)
  - id: sendGreeting
    kind: question
    writes: [messages, session_context]
    description: "Send intro messages and set first question key."
    nodeConfig:
      greeting:
        stringKeys: ["myFlow.greet", "myFlow.followup"]
        afterQuestionKey: "Q1"
        initialSessionContext:
          started: true
          awaiting_user: true
          step_question_index: 0
          step_clarifier_used: false

  # Question node — simple (single stringKey)
  - id: askFirstQuestion
    kind: question
    writes: [messages, session_context]
    description: "Ask user the first question."
    nodeConfig:
      question:
        stringKey: "myFlow.firstQuestion"
        questionKey: "Q1"
        questionPurpose: "collect_answer"
        targetVariable: "answer"

  # Question node — with interpolateFrom, allowAIRephrase, prefix, rephraseContext
  # - id: askWithRephrase
  #   kind: question
  #   writes: [messages, session_context]
  #   nodeConfig:
  #     question:
  #       stringKey: "myFlow.roleQuestion"
  #       questionKey: "Q_ROLE"
  #       questionPurpose: "collect_role"
  #       targetVariable: "role"
  #       allowAIRephrase: true
  #       prefix:
  #         stateField: "user_context.first_name"
  #         fallback: "there"
  #       rephraseContext:
  #         industryField: "user_context.industry"
  #         roleField: "user_context.persona_role"
  #         actorRole: "SAAS Enterprise Account Executive"
  #         tone: "conversational, curious"

  # Question node — multi-part (stringKeys joined with \n\n)
  # - id: askMultiPart
  #   kind: question
  #   writes: [messages, session_context]
  #   nodeConfig:
  #     question:
  #       stringKeys: ["myFlow.intro", "myFlow.body", "myFlow.prompt"]
  #       questionKey: "Q_INDUSTRY"
  #       interpolateFrom:
  #         name: "user_context.first_name"

  # Ingest node — generic (uses ingestFieldMappings from config)
  - id: ingestFirstAnswer
    kind: ingest
    reads: [messages, session_context]
    writes: [user_context, session_context]
    nodeConfig:
      ingest: {}

  # Ingest node — affirmative check, on accept ask next question
  # - id: ingestConfirm
  #   kind: ingest
  #   reads: [messages, session_context]
  #   writes: [messages, session_context]
  #   signalAgents: false
  #   nodeConfig:
  #     ingest:
  #       affirmativeCheckConfig:
  #         rejectStringKey: "myFlow.reject"
  #         rejectPatch:
  #           awaiting_user: false
  #           last_question_key: null
  #         acceptQuestionConfig:
  #           stringKey: "myFlow.nextQuestion"
  #           questionKey: "Q_NEXT"
  #           questionPurpose: "collect_next"
  #           targetVariable: "next"

  # Ingest node — affirmative check, on accept push message and patch
  # - id: ingestConfirmWithMessage
  #   kind: ingest
  #   reads: [messages, session_context]
  #   writes: [messages, session_context]
  #   nodeConfig:
  #     ingest:
  #       affirmativeCheckConfig:
  #         rejectStringKey: "myFlow.reject"
  #         rejectPatch:
  #           last_question_key: "Q_CONFIRM"
  #         acceptStringKey: "myFlow.continuation"
  #         acceptPatch:
  #           awaiting_user: false
  #           last_question_key: null

  # Display node — generic (reads state path, optional download URL)
  # - id: displayOutput
  #   kind: compute
  #   reads: [readout_context, session_context]
  #   writes: [messages]
  #   nodeConfig:
  #     display:
  #       statePath: "readout_context.rendered_outputs.markdown"
  #       fallbackMessage: "Your output is ready."
  #       appendDownloadUrl:
  #         stateField: "readout_context.delivery.download.url"
  #         fallbackPattern: "/readout/{{session_id}}.md"

  # Compute node (custom handler)
  # - id: nodeCompute
  #   kind: compute
  #   handlerRef: "myFlow.nodeCompute"
  #   reads: [session_context]
  #   writes: [session_context]
  #   signalAgents: true

  # Integration node (external API)
  # - id: nodeIntegration
  #   kind: integration
  #   handlerRef: "myFlow.nodeIntegration"
  #   writes: [session_context]

# ── Transitions (required) ────────────────────────────────────────────
transitions:
  conditional:
    - from: routeInitFlow
      routerRef: "myFlow.routeInitFlow"
      destinations:
        sendGreeting: sendGreeting
        askFirstQuestion: askFirstQuestion
        ingestFirstAnswer: ingestFirstAnswer
        end: "__end__"

  static:
    - { from: sendGreeting, to: "__end__" }
    - { from: askFirstQuestion, to: "__end__" }
    - { from: ingestFirstAnswer, to: "__end__" }

# ── Routing keys (optional) ───────────────────────────────────────────
routingKeys:
  - session_context.step
  - session_context.last_question_key
  - session_context.awaiting_user
  - session_context.started
  - session_context.primitive_counter
  - session_context.reason_trace
  - messages

# ── Runtime config references (optional) ──────────────────────────────
runtimeConfigRefs:
  modelAliases:
    default: "gpt-3.5-turbo"
  messagePolicyRef: "myFlow.messagePolicy"
  promptSetRef: "myFlow.aiPrompts"

# ── Per-graph conversation config (optional) ─────────────────────────
config:
  meta:
    flowTitle: "My Flow"
    flowDescription: "Brief description for the UI."
    steps:
      - key: STEP1
        label: "Step 1"
        order: 1
        countable: true
        totalQuestions: 1
        countingStrategy: questionKeyMap
# countingStrategy: questionKeyMap | useCaseSelect | readoutReady | dynamicCount

  overlayPrefixes:
    default: "To stay aligned, "

  exampleTemplates:
    role:
      - 'Example (as a user): "You lead the team that owns..."'
    industry:
      - 'Example (as a user): "Your organization is in {{industry}}..."'

  progressRules:
    questionKeyMap:
      Q1: 0
    dynamicCountField: "session_context.items"
    dynamicCountStepKey: "STEP1"
# useCaseSelectQuestionKey: "S3_USE_CASE_SELECT"  # For useCaseSelect strategy

  options:
    Q_CONFIRM: ["Yes", "No"]

  dynamicOptions:
    Q_SELECT:
      source: service
      serviceRef: my-service.getOptions
# Or: source: state, statePath: use_case_context.items, format: numbered_list

  ingestFieldMappings:
    Q1: { targetField: user_context.answer, sanitizeAs: goal }
# sanitizeAs: name | role | industry | goal | timeframe
# captureObjective: true  # For goal fields

  continuationTriggers:
    - traceIncludes: "step1:complete"
      notReadoutReady: true
      steps: ["STEP1"]
      items: ["Continue"]

  routingRules:
    routeInitFlow:
      - when: { primitive_counter: 0, messages_empty: true }
        goto: sendGreeting
      - when: { started: false }
        goto: sendGreeting
      - when: { awaiting_user: true, last_question_key: "Q1" }
        goto: ingestFirstAnswer
      - when: { awaiting_user: false }
        goto: askFirstQuestion
      - default: end
# Routing when-keys: primitive_counter, messages_empty, started, awaiting_user,
# state_path_empty, state_path_not_empty, state_path_equals, state_path_not_equals,
# state_path_length_gt, state_path_length_lt, last_answer_equals, last_question_key,
# trace_includes, trace_not_includes, step_equals

  steps:
    - id: STEP1
      label: "step1-My_Step"

  models:
    default:
      model: "gpt-3.5-turbo"
      temperature: 0.4
      maxRetries: 1

  messagePolicy:
    intro: { allowAIRephrase: false, forbidFirstPerson: false }
    name: { allowAIRephrase: false, forbidFirstPerson: false }
    industry: { allowAIRephrase: false, forbidFirstPerson: false }
    role: { allowAIRephrase: false, forbidFirstPerson: false }
    industryClarifier: { allowAIRephrase: false, forbidFirstPerson: true }
    roleClarifier: { allowAIRephrase: true, forbidFirstPerson: true }
    default: { allowAIRephrase: false, forbidFirstPerson: false }

  aiPrompts:
    selectOption: >-
      You select the best option from the list.
      Return JSON only: {"option":"...","confidence":0.0-1.0}.

  strings:
    myFlow.greet: "Welcome!"
    myFlow.followup: "What would you like to accomplish?"
    myFlow.firstQuestion: "What is your primary goal?"
    myFlow.reject: "No problem. Tell me when you're ready."
    myFlow.continuation: "Great, let's continue."
    myFlow.nextQuestion: "What's your next priority?"

  questionTemplates:
    - key: Q1
      question: |
        [Step 1 – Question 1 of 1]
        {{name}}, could you share your preference?

  clarifierRetryText:
    step1: "Please answer with yes or no."
# step1Ready, step2ConfirmPlan, step2Obstacle — use for multi-step flows

  clarificationAcknowledgement:
    - "Thank you for the clarification."
    - "Understood."

  readoutVoice:
    rolePerspective: "Coach_Affirmative"
    voiceCharacteristics: "Energetic and optimistic"
    behavioralIntent: "Close on a motivational note"

  readout:
    sectionKeys:
      - framing_header
      - section_1
      - section_2
    sectionContract: |
      Section 1: Summary
      Section 2: Details
      Use ReadinessLevel naming and preserve order.

  delivery:
    outputTargets: ["download"]
    defaultOutputTargets: ["download"]
    allowMultiTarget: true
    overridesByTenant: {}

  signalAgents:
    enabled: true
    ttlMs: 1000

# ── Compile-time validation (optional) ────────────────────────────────
validation:
  requiredStateFields:
    - session_context.session_id
  invariants:
    - "All node handlerRefs must resolve in the handler registry"
    - "All routerRefs must resolve in the router registry"
